spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:dripking-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

security.jwt.secret-key=test-only-change-me-test-only-change-me-test-only-change-me
security.jwt.expiration-time=86400000

app.cors.allowed-origins=http://localhost:3000
app.course-generation.trial.guest-limit=2
app.course-generation.captcha.enabled=true
app.course-generation.captcha.dev-token=dev-captcha
app.course-generation.rate-limit.enabled=true
app.course-generation.cost.hard-cap-enabled=true
app.course-generation.cost.estimated-cost-per-generation=0
app.course-generation.cost.monthly-hard-cap=5000
