spring.application.name=Dripking
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

app.storage.s3.endpoint=${S3_ENDPOINT:}
app.storage.s3.region=${S3_REGION:}
app.storage.s3.bucket=${S3_BUCKET:}
app.storage.s3.access-key=${S3_ACCESS_KEY:}
app.storage.s3.secret-key=${S3_SECRET_KEY:}
app.storage.s3.public-base-url=${S3_PUBLIC_BASE_URL:}
app.storage.s3.key-prefix=${S3_KEY_PREFIX:content-images}
