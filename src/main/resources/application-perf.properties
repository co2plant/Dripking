spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:dripking}
spring.datasource.username=${POSTGRES_USER:dripking}
spring.datasource.password=${POSTGRES_PASSWORD:dripking}

security.jwt.secret-key=${JWT_SECRET:dev-only-change-me-dev-only-change-me-dev-only-change-me}
security.jwt.expiration-time=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://dripking-front.vercel.app}
app.dev-admin.enabled=${DEV_ADMIN_ENABLED:false}
app.dev-admin.email=${DEV_ADMIN_EMAIL:}
app.dev-admin.password=${DEV_ADMIN_PASSWORD:}
app.dev-admin.nickname=${DEV_ADMIN_NICKNAME:local-admin}

app.course-generation.trial.guest-limit=${COURSE_GUEST_TRIAL_LIMIT:2}
app.course-generation.captcha.enabled=${COURSE_CAPTCHA_ENABLED:true}
app.course-generation.captcha.secret=${COURSE_CAPTCHA_SECRET:}
app.course-generation.captcha.verify-url=${COURSE_CAPTCHA_VERIFY_URL:https://www.google.com/recaptcha/api/siteverify}
app.course-generation.captcha.dev-token=${COURSE_CAPTCHA_DEV_TOKEN:dev-captcha}
app.course-generation.rate-limit.enabled=${COURSE_RATE_LIMIT_ENABLED:true}
app.course-generation.rate-limit.window-seconds=${COURSE_RATE_LIMIT_WINDOW_SECONDS:60}
app.course-generation.rate-limit.authenticated-limit=${COURSE_RATE_LIMIT_AUTHENTICATED_LIMIT:20}
app.course-generation.rate-limit.guest-limit=${COURSE_RATE_LIMIT_GUEST_LIMIT:5}
app.course-generation.rate-limit.ip-limit=${COURSE_RATE_LIMIT_IP_LIMIT:30}
app.course-generation.rate-limit.global-limit=${COURSE_RATE_LIMIT_GLOBAL_LIMIT:100}
app.course-generation.cost.hard-cap-enabled=${COURSE_HARD_CAP_ENABLED:true}
app.course-generation.cost.estimated-cost-per-generation=${COURSE_ESTIMATED_COST_PER_GENERATION:0}
app.course-generation.cost.monthly-hard-cap=${COURSE_MONTHLY_HARD_CAP:5000}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/seed/base-seed.sql,classpath:db/seed/real-japan-seed.sql,classpath:db/seed/perf-seed.sql

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR
logging.level.com.dripking=DEBUG

springdoc.packages-to-scan=kr.co.inntavern.dripking
springdoc.default-consumes-media-type=application/json;charset=UTF-8
springdoc.default-produces-media-type=application/json;charset=UTF-8
springdoc.cache.disabled=true
springdoc.api-docs.path=/api/v3/api-docs
springdoc.api-docs.groups.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
