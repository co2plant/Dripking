spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:dripking}
spring.datasource.username=${POSTGRES_USER:dripking}
spring.datasource.password=${POSTGRES_PASSWORD:dripking}

security.jwt.secret-key=${JWT_SECRET:dev-only-change-me-dev-only-change-me-dev-only-change-me}
security.jwt.expiration-time=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://dripking-front.vercel.app}
app.dev-admin.enabled=${DEV_ADMIN_ENABLED:false}
app.dev-admin.email=${DEV_ADMIN_EMAIL:}
app.dev-admin.password=${DEV_ADMIN_PASSWORD:}
app.dev-admin.nickname=${DEV_ADMIN_NICKNAME:local-admin}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/seed/base-seed.sql,classpath:db/seed/real-japan-seed.sql,classpath:db/seed/perf-seed.sql

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR
logging.level.com.dripking=DEBUG

springdoc.packages-to-scan=kr.co.inntavern.dripking
springdoc.default-consumes-media-type=application/json;charset=UTF-8
springdoc.default-produces-media-type=application/json;charset=UTF-8
springdoc.cache.disabled=true
springdoc.api-docs.path=/api/v3/api-docs
springdoc.api-docs.groups.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
